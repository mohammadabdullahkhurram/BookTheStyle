name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # 8.5 is allowed to fail: it isn't verified locally yet, so it runs for
    # forward-compat signal without blocking the build.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        # 8.4 is the floor we actually support: Laravel 13 pulls Symfony 8.1,
        # which requires PHP >= 8.4.1, so 8.3 cannot install dependencies.
        php-version: ['8.4']
        include:
          - php-version: '8.5'
            experimental: true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Run Tests
        # On failure, surface the failing tests as workflow annotations —
        # annotations are readable through the public checks API, full job
        # logs are not.
        run: |
          set -o pipefail
          php artisan test 2>&1 | tee /tmp/test-output.log || {
            grep -E "FAILED|⨯|Failed asserting|Exception|Error:" /tmp/test-output.log | head -30 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          }

  # The test suite runs on SQLite, which silently IGNORES MySQL-only schema
  # semantics — column positions (->after), strict ALTER validation, etc.
  # Production is MySQL, so this job is the only thing that proves the full
  # migration set actually runs there: a real MySQL 8 service, migrated from
  # scratch with the same `migrate --force` production uses (never fresh),
  # then run again to prove a resumed deploy no-ops cleanly.
  mysql-migrations:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: bookthestyle_ci
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Migrate from scratch on MySQL
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bookthestyle_ci
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          php artisan migrate --force
          php artisan migrate:status
          # A second run must be a clean no-op (what a resumed deploy sees).
          php artisan migrate --force
